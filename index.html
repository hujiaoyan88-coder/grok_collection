<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸コレクション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;display=swap');
        
        body {
            font-family: 'Noto Sans JP', system-ui, sans-serif;
        }
        
        .collection-card {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                       box-shadow 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .collection-card:active {
            transform: scale(0.97);
        }
        
        .modal {
            animation: modalPop 0.2s ease-out forwards;
        }
        
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .item-image {
            transition: transform 0.3s ease;
        }
        
        .collection-card:hover .item-image {
            transform: scale(1.05);
        }
        
        .filter-chip {
            transition: all 0.2s ease;
        }
        
        .filter-chip.active {
            background-color: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }
        
        .status-badge {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- ヘッダー -->
        <div class="px-5 pt-8 pb-4 bg-zinc-900 sticky top-0 z-50 border-b border-zinc-800">
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-x-3">
                    <div class="w-11 h-11 bg-violet-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-boxes-stacked text-3xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter">コレクション</h1>
                        <p class="text-xs text-zinc-500 -mt-1">My Collection</p>
                    </div>
                </div>
                <button onclick="clearAllData()" 
                        class="text-zinc-500 hover:text-red-400 transition-colors p-2">
                    <i class="fa-solid fa-trash text-lg"></i>
                </button>
            </div>
        </div>

        <!-- 統計 -->
        <div class="px-5 pt-5 grid grid-cols-3 gap-3">
            <div class="bg-zinc-900 rounded-3xl p-4 text-center">
                <div class="text-3xl font-bold" id="stat-total">0</div>
                <div class="text-xs text-zinc-500 mt-0.5">総アイテム</div>
            </div>
            <div class="bg-zinc-900 rounded-3xl p-4 text-center">
                <div class="text-3xl font-bold text-emerald-400" id="stat-owned">0</div>
                <div class="text-xs text-zinc-500 mt-0.5">所有中</div>
            </div>
            <div class="bg-zinc-900 rounded-3xl p-4 text-center">
                <div class="text-3xl font-bold text-sky-400" id="stat-wishlist">0</div>
                <div class="text-xs text-zinc-500 mt-0.5">欲しい</div>
            </div>
        </div>

        <!-- 検索 -->
        <div class="px-5 pt-5">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-4 top-3.5 text-zinc-500"></i>
                <input type="text" id="search-input" 
                       class="w-full bg-zinc-900 border border-zinc-800 focus:border-violet-500 transition-colors pl-11 pr-4 py-3 rounded-3xl text-sm placeholder:text-zinc-500"
                       placeholder="アイテムを検索...">
            </div>
        </div>

        <!-- ステータスフィルター -->
        <div class="px-5 pt-4">
            <div class="flex bg-zinc-900 rounded-3xl p-1">
                <button onclick="setStatusFilter('all')" id="filter-all"
                        class="flex-1 py-2 text-sm font-medium rounded-[20px] transition-all active-filter">
                    すべて
                </button>
                <button onclick="setStatusFilter('owned')" id="filter-owned"
                        class="flex-1 py-2 text-sm font-medium rounded-[20px] transition-all">
                    所有中
                </button>
