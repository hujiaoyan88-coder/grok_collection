<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Grok 作品コレクション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #05050a;
            color: #e0f2fe;
        }
        
        .grok-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(103, 232, 249, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(165, 243, 252, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .neon-cyan {
            text-shadow: 0 0 10px #67e8f9,
                         0 0 20px #67e8f9;
        }
        
        .work-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(103, 232, 249, 0.2);
            transition: all 0.3s ease;
        }
        
        .work-card:hover {
            border-color: #67e8f9;
            box-shadow: 0 0 25px rgba(103, 232, 249, 0.3);
            transform: translateY(-4px);
        }
        
        .grok-btn {
            background: linear-gradient(90deg, #22d3ee, #67e8f9);
            color: #0f172a;
            font-weight: 600;
        }
    </style>
</head>
<body class="grok-bg min-h-screen">
    <div class="max-w-md mx-auto flex flex-col min-h-screen">
        <!-- Grok風ヘッダー -->
        <div class="px-5 pt-8 pb-6 bg-black/80 backdrop-blur border-b border-cyan-500/20 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-xl font-bold">G</div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tighter neon-cyan">GROK COLLECTION</h1>
                    <p class="text-xs text-cyan-300/80 -mt-1">Understand the Universe × Your Works</p>
                </div>
            </div>
        </div>

        <!-- 統計 -->
        <div class="px-5 pt-6">
            <div class="bg-slate-900/80 border border-cyan-500/30 rounded-3xl p-5 text-center">
                <div id="stat-total" class="text-6xl font-bold text-cyan-300">0</div>
                <div class="text-xs tracking-[2px] text-slate-400 mt-1">WORKS IN UNIVERSE</div>
            </div>
        </div>

        <!-- 検索 -->
        <div class="px-5 pt-6">
            <div class="relative">
                <input id="search-input" type="text" placeholder="Search works..." 
                       class="w-full bg-slate-900 border border-slate-700 focus:border-cyan-400 rounded-3xl pl-12 py-4 text-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-cyan-400/70"></i>
            </div>
        </div>

        <!-- カテゴリ -->
        <div class="px-5 pt-4">
            <div id="category-chips" class="flex gap-2 overflow-x-auto pb-4"></div>
        </div>

        <!-- 作品一覧 -->
        <div class="flex-1 overflow-y-auto px-5 pb-20" id="scroll-container">
            <div id="items-grid" class="grid grid-cols-2 gap-4"></div>
            <div id="empty-state" class="hidden py-20 text-center">
                <i class="fa-solid fa-satellite text-6xl text-cyan-500/30 mb-4"></i>
                <p class="text-slate-400">まだ作品がありません</p>
            </div>
        </div>
    </div>

    <!-- Grok風追加ボタン -->
    <button onclick="openAddModal()" 
            class="fixed bottom-8 right-6 w-16 h-16 grok-btn rounded-2xl flex items-center justify-center shadow-xl shadow-cyan-500/50 active:scale-95 text-2xl z-50">
        <i class="fa-solid fa-plus"></i>
    </button>

    <!-- モーダル -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-end justify-center z-[100]">
        <div class="bg-slate-900 w-full max-w-md rounded-t-3xl p-6 border-t-4 border-cyan-400">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6 text-cyan-100">New Creation</h2>
            
            <!-- フォーム（URL版） -->
            <div class="space-y-5">
                <input id="item-name" type="text" placeholder="作品名" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:border-cyan-400">
                <input id="item-date" type="date" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:border-cyan-400">
                <input id="item-category" type="text" placeholder="カテゴリ（イラスト / 3D / ゲーム...）" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:border-cyan-400">
                <input id="item-image-url" type="text" placeholder="画像URL (Google Driveなど)" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:border-cyan-400">
                <textarea id="item-memo" rows="3" placeholder="説明・メモ" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:border-cyan-400"></textarea>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-800 rounded-2xl">Cancel</button>
                <button onclick="saveItem()" class="flex-1 py-4 grok-btn rounded-2xl">Save to Universe</button>
            </div>
        </div>
    </div>

    <script>
    let items = [];
    let currentFilter = { search: '', category: '' };
    let editingId = null;

    function loadFromStorage() {
        const saved = localStorage.getItem('cosmicWorksURL');
        if (saved) {
            items = JSON.parse(saved);
        } else {
            items = [
                {id: Date.now()-100000, name: "銀河の夜明け", category: "デジタルイラスト", memo: "星の光にこだわった", imageUrl: "https://picsum.photos/id/1015/800/600", date: "2025-06-15"},
                {id: Date.now()-80000, name: "ネビュラ探検船", category: "3Dモデル", memo: "", imageUrl: "https://picsum.photos/id/201/800/600", date: "2025-07-01"}
            ];
            saveToStorage();
        }
    }

    function saveToStorage() {
        localStorage.setItem('cosmicWorksURL', JSON.stringify(items));
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = items.length;
    }

    function renderCategoryChips() {
        const container = document.getElementById('category-chips');
        container.innerHTML = '';
        
        const allBtn = document.createElement('button');
        allBtn.textContent = 'すべて';
        allBtn.className = `px-4 py-1.5 text-xs rounded-full whitespace-nowrap border transition-all ${currentFilter.category === '' ? 'bg-cyan-400 text-black border-cyan-400' : 'bg-white/10 border-white/20 text-white/80 hover:bg-white/20'}`;
        allBtn.onclick = () => { currentFilter.category = ''; renderAll(); };
        container.appendChild(allBtn);

        const cats = [...new Set(items.map(i => i.category))].sort();
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat;
            btn.className = `px-4 py-1.5 text-xs rounded-full whitespace-nowrap border transition-all ${currentFilter.category === cat ? 'bg-cyan-400 text-black border-cyan-400' : 'bg-white/10 border-white/20 text-white/80 hover:bg-white/20'}`;
            btn.onclick = () => { currentFilter.category = cat; renderAll(); };
            container.appendChild(btn);
        });
    }

    function renderItems() {
        const grid = document.getElementById('items-grid');
        grid.innerHTML = '';
        const empty = document.getElementById('empty-state');

        let filtered = items.filter(item => {
            const s = currentFilter.search.toLowerCase();
            return (!s || item.name.toLowerCase().includes(s) || (item.memo||'').toLowerCase().includes(s)) &&
                   (!currentFilter.category || item.category === currentFilter.category);
        }).sort((a,b) => new Date(b.date) - new Date(a.date));

        if (filtered.length === 0) {
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = "work-card bg-white/5 border border-white/10 rounded-3xl overflow-hidden";
            card.innerHTML = `
                <img src="${item.imageUrl}" class="w-full h-40 object-cover" onerror="this.src='https://picsum.photos/id/1005/400/300'">
                <div class="p-4">
                    <div class="font-semibold">${item.name}</div>
                    <div class="text-xs text-cyan-300 mt-1">${item.category} • ${item.date}</div>
                    ${item.memo ? `<div class="text-xs text-white/60 mt-2 line-clamp-2">${item.memo}</div>` : ''}
                    <div class="flex gap-2 mt-4">
                        <button onclick="editItem(${item.id});event.stopImmediatePropagation()" class="flex-1 py-2 text-xs bg-white/10 hover:bg-white/20 rounded-2xl">編集</button>
                        <button onclick="deleteItem(${item.id});event.stopImmediatePropagation()" class="flex-1 py-2 text-xs bg-white/10 hover:bg-red-500/30 text-red-300 rounded-2xl">削除</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function renderAll() {
        renderItems();
        updateStats();
        renderCategoryChips();
    }

    function openAddModal() {
        editingId = null;
        document.getElementById('modal-title').textContent = '新しい作品を追加';
        document.getElementById('item-name').value = '';
        document.getElementById('item-category').value = '';
        document.getElementById('item-memo').value = '';
        document.getElementById('item-image-url').value = '';
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('item-date').value = today;
        
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
    }

    function editItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;

        editingId = id;
        document.getElementById('modal-title').textContent = '作品を編集';
        
        document.getElementById('item-name').value = item.name;
        document.getElementById('item-date').value = item.date;
        document.getElementById('item-category').value = item.category;
        document.getElementById('item-memo').value = item.memo || '';
        document.getElementById('item-image-url').value = item.imageUrl || '';

        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
    }

    function saveItem() {
        const name = document.getElementById('item-name').value.trim();
        if (!name) return alert('作品名を入力して！');
        
        const imageUrl = document.getElementById('item-image-url').value.trim();
        if (!imageUrl) return alert('画像URLを入力してね！');

        const date = document.getElementById('item-date').value;
        if (!date) return alert('制作日を入力してね');

        const category = document.getElementById('item-category').value.trim() || 'その他';
        const memo = document.getElementById('item-memo').value.trim();

        if (editingId) {
            const idx = items.findIndex(i => i.id === editingId);
            items[idx] = { ...items[idx], name, category, memo, date, imageUrl };
        } else {
            items.push({
                id: Date.now(),
                name,
                category,
                memo,
                imageUrl,
                date
            });
        }

        saveToStorage();
        closeModal();
        renderAll();
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
    }

    function deleteItem(id) {
        if (confirm('この作品を削除しますか？')) {
            items = items.filter(i => i.id !== id);
            saveToStorage();
            renderAll();
        }
    }

    function clearAllData() {
        if (confirm('すべての作品データを削除しますか？')) {
            localStorage.removeItem('cosmicWorksURL');
            items = [];
            renderAll();
        }
    }

    function setupSearch() {
        document.getElementById('search-input').addEventListener('input', e => {
            currentFilter.search = e.target.value;
            renderItems();
        });
    }

    function init() {
        loadFromStorage();
        setupSearch();
        renderAll();
        console.log('%c宇宙作品コレクション (URL版) 起動！', 'color:#67e8f9');
    }

    window.onload = init;
    </script>
</body>
</html>
